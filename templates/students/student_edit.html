{% extends 'base.html' %}

{% block title %}ویرایش {{ student.user.get_full_name }}{% endblock %}

{% block content %}
<h1>ویرایش هنرجو</h1>

<form method="post">
    {% csrf_token %}
    
    <fieldset>
        <legend>اطلاعات کاربری</legend>
        <p><label>نام:</label><input type="text" name="first_name" value="{{ student.user.first_name }}"></p>
        <p><label>نام خانوادگی:</label><input type="text" name="last_name" value="{{ student.user.last_name }}"></p>
        <p><label>کد ملی:</label><input type="text" name="national_code" value="{{ student.user.national_code|default:'' }}"></p>
    </fieldset>
    
    <fieldset>
        <legend>اطلاعات هنرجویی</legend>
        <p><label>باشگاه:</label>
            <select name="club">
                {% for c in clubs %}
                <option value="{{ c.id }}" {% if c.id == student.club_id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </p>
        <p><label>تاریخ تولد:</label><input type="text" name="birth_date" value="{{ student.birth_date|default:'' }}"></p>
        <p><label>کمربند:</label>
            <select name="current_belt">
                {% for value, label in student.BELTS %}
                <option value="{{ value }}" {% if value == student.current_belt %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </p>
        <p><label>یادداشت:</label><textarea name="notes">{{ student.notes|default:'' }}</textarea></p>
    </fieldset>
    
    <button type="submit">ذخیره</button>
    <a href="{% url 'students:student_detail' student.pk %}">انصراف</a>
</form>
{% endblock %}
