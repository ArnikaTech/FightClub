{% extends 'base.html' %}

{% block title %}افزودن مربی{% endblock %}

{% block content %}
<h1>افزودن مربی</h1>

<form method="post">
    {% csrf_token %}
    <p><label>کاربر:</label>
        <select name="user_id" required>
            <option value="">--</option>
            {% for u in users %}<option value="{{ u.id }}">{{ u.get_full_name }} ({{ u.phone }})</option>{% endfor %}
        </select>
    </p>
    <p><label>باشگاه:</label>
        <select name="club_id" required>
            <option value="">--</option>
            {% for c in clubs %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
    </p>
    <p><label>نقش:</label>
        <select name="role">
            <option value="instructor">مربی</option>
            <option value="manager">مدیر</option>
            <option value="assistant">کمک‌مربی</option>
        </select>
    </p>
    <button type="submit">افزودن</button>
</form>
{% endblock %}
