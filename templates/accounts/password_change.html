{% extends 'base.html' %}

{% block title %}تغییر رمز{% endblock %}

{% block content %}
<h1>تغییر رمز عبور</h1>

{% if messages %}{% for m in messages %}<p style="color:{% if m.tags == 'error' %}red{% else %}green{% endif %};">{{ m }}</p>{% endfor %}{% endif %}

<form method="post">
    {% csrf_token %}
    <p><label>رمز فعلی:</label><input type="password" name="current_password" required></p>
    <p><label>رمز جدید:</label><input type="password" name="new_password" required></p>
    <p><label>تکرار رمز جدید:</label><input type="password" name="confirm_password" required></p>
    <button type="submit">تغییر رمز</button>
</form>
{% endblock %}
