<div class="bottom-sheet-overlay" id="bottomSheetOverlay"></div>
<div class="bottom-sheet" id="bottomSheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">منوی بیشتر</div>
    <div class="bottom-sheet-menu">
        <a href="#" class="bs-menu-item">
            <div class="bs-icon"><i class="bi bi-person-circle"></i></div>
            <span>پروفایل من</span>
            <i class="bi bi-chevron-left bs-arrow"></i>
        </a>
        
        {% if user.is_super_manager %}
        <a href="#" class="bs-menu-item">
            <div class="bs-icon"><i class="bi bi-building"></i></div>
            <span>باشگاه‌ها</span>
            <i class="bi bi-chevron-left bs-arrow"></i>
        </a>
        <a href="#" class="bs-menu-item">
            <div class="bs-icon"><i class="bi bi-person-badge-fill"></i></div>
            <span>مربیان</span>
            <i class="bi bi-chevron-left bs-arrow"></i>
        </a>
        {% endif %}
        
        <a href="#" class="bs-menu-item">
            <div class="bs-icon"><i class="bi bi-megaphone-fill"></i></div>
            <span>اعلان‌ها</span>
            <i class="bi bi-chevron-left bs-arrow"></i>
        </a>
        
        <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit" class="bs-menu-item" style="width:100%;border:none;background:none;">
                <div class="bs-icon" style="color: var(--danger);"><i class="bi bi-box-arrow-right"></i></div>
                <span>خروج</span>
            </button>
        </form>
    </div>
</div>
